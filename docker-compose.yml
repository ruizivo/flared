services:
  flared:
    build: .
    container_name: flared
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config:/config
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FLARED_PORT: "3000"
      NODE_ENV: production
      FLARED_CONFIG_DIR: /config
      FLARED_HOST_GATEWAY: host.docker.internal
